# ALOBO Booking - Local Development Environment
# Run with: docker-compose up -d

version: "3.8"

services:
  # PostgreSQL with PostGIS extension
  postgres:
    image: postgis/postgis:15-3.3-alpine
    container_name: alogo-postgres-dev
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: alogo_dev
      POSTGRES_INITDB_ARGS: "-E UTF8"
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - alogo-network

  # Redis (optional - for caching and future features)
  redis:
    image: redis:7-alpine
    container_name: alogo-redis-dev
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - alogo-network

  # Backend API (FastAPI)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: alogo-backend-dev
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/alobo_dev
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - /app/__pycache__
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - alogo-network

  # Admin Dashboard Frontend (React + Vite)
  admin-dashboard:
    build:
      context: ./admin-dashboard
      dockerfile: Dockerfile
      target: development
    container_name: alogo-admin-dashboard-dev
    environment:
      VITE_API_BASE_URL: http://backend:8000/api/v1
      VITE_APP_NAME: ALOBO Admin Dashboard
    ports:
      - "3000:3000"
    volumes:
      - ./admin-dashboard:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - alogo-network

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local

networks:
  alogo-network:
    driver: bridge

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PickAlo Map</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body, #map {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        /* Custom marker styles */
        .custom-marker {
            background: #4CAF50;
            border: 3px solid #fff;
            border-radius: 50%;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        .custom-marker-cluster {
            background: #2196F3;
            border: 3px solid #fff;
            border-radius: 50%;
            color: white;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        .marker-popup {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        .popup-content {
            padding: 8px;
            min-width: 200px;
        }

        .popup-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px;
            color: #333;
        }

        .popup-info {
            font-size: 13px;
            color: #666;
            margin-bottom: 2px;
        }

        .popup-price {
            font-size: 14px;
            font-weight: 600;
            color: #4CAF50;
            margin-top: 4px;
        }

        .popup-button {
            background: #2196F3;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            margin-top: 8px;
            cursor: pointer;
            font-size: 13px;
            width: 100%;
        }

        .popup-button:hover {
            background: #1976D2;
        }

        /* Loading indicator */
        .loading-indicator {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.9);
            padding: 16px 24px;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.15);
            z-index: 1000;
            display: none;
        }

        .loading-indicator.active {
            display: block;
        }
    </style>
</head>
<body>
    <div id="map"></div>

    <div class="loading-indicator" id="loading">
        <div>Loading venues...</div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // Global variables
        let map = null;
        let venueMarkers = [];
        let clusterMarkers = [];
        let currentZoom = 12;

        // Initialize map
        function initMap(centerLat, centerLng, initialZoom) {
            // Create map
            map = L.map('map', {
                center: [centerLat, centerLng],
                zoom: initialZoom,
                zoomControl: true,
                attributionControl: false
            });

            // Add OpenStreetMap tiles
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap contributors',
                maxZoom: 19
            }).addTo(map);

            // Track zoom changes
            map.on('zoomend', function() {
                currentZoom = map.getZoom();
                notifyRegionChange();
            });

            // Track pan/move
            map.on('moveend', function() {
                notifyRegionChange();
            });

            // Track marker clicks
            map.on('click', function() {
                // Send null to deselect
                sendToReactNative({
                    type: 'mapClick'
                });
            });
        }

        // Send message to React Native
        function sendToReactNative(data) {
            if (window.ReactNativeWebView) {
                window.ReactNativeWebView.postMessage(JSON.stringify(data));
            } else {
                // For testing in browser
                console.log('To React Native:', data);
            }
        }

        // Notify React Native of region change
        function notifyRegionChange() {
            const bounds = map.getBounds();
            const region = {
                south: bounds.getSouth(),
                north: bounds.getNorth(),
                west: bounds.getWest(),
                east: bounds.getEast(),
                zoom: currentZoom
            };

            sendToReactNative({
                type: 'regionChange',
                region: region
            });
        }

        // Create custom marker icon
        function createMarkerIcon(isCluster = false, count = 0) {
            const size = isCluster ? Math.min(30 + count * 2, 60) : 24;
            const fontSize = isCluster ? Math.min(12 + count * 0.3, 16) : 0;

            return L.divIcon({
                className: isCluster ? 'custom-marker-cluster' : 'custom-marker',
                iconSize: [size, size],
                iconAnchor: [size / 2, size / 2],
                popupAnchor: [0, -size / 2],
                html: isCluster ? `<span style="font-size: ${fontSize}px">${count}</span>` : ''
            });
        }

        // Clear all markers
        function clearMarkers() {
            // Remove venue markers
            venueMarkers.forEach(marker => map.removeLayer(marker));
            venueMarkers = [];

            // Remove cluster markers
            clusterMarkers.forEach(marker => map.removeLayer(marker));
            clusterMarkers = [];
        }

        // Display venue markers
        function displayVenues(venues) {
            clearMarkers();

            venues.forEach(venue => {
                const marker = L.marker(
                    [venue.latitude, venue.longitude],
                    {
                        icon: createMarkerIcon(false),
                        title: venue.name
                    }
                );

                // Create popup content
                const popupContent = `
                    <div class="popup-content">
                        <div class="popup-title">${venue.name}</div>
                        <div class="popup-info">📍 ${venue.district || 'Hanoi'}</div>
                        <div class="popup-info">🏟️ ${venue.venue_type || 'Sports Venue'}</div>
                        ${venue.base_pricePerHour ? `<div class="popup-price">${formatPrice(venue.basePricePerHour)}/hour</div>` : ''}
                        <button class="popup-button" onclick="handleVenueClick('${venue.id}')">
                            View Details
                        </button>
                    </div>
                `;

                marker.bindPopup(popupContent, {
                    maxWidth: 250,
                    className: 'marker-popup'
                });

                // Handle marker click
                marker.on('click', function() {
                    sendToReactNative({
                        type: 'venuePress',
                        venueId: venue.id
                    });
                });

                marker.addTo(map);
                venueMarkers.push(marker);
            });
        }

        // Display clustered markers
        function displayClusters(clusters) {
            clearMarkers();

            clusters.forEach(cluster => {
                const marker = L.marker(
                    [cluster.latitude, cluster.longitude],
                    {
                        icon: createMarkerIcon(true, cluster.count),
                        title: `${cluster.count} venues`
                    }
                );

                // Create popup with venue preview
                const previewVenues = cluster.venues.slice(0, 3);
                const popupContent = `
                    <div class="popup-content">
                        <div class="popup-title">${cluster.count} Venues</div>
                        ${previewVenues.map(v => `<div class="popup-info">• ${v.name}</div>`).join('')}
                        ${cluster.count > 3 ? `<div class="popup-info">...and ${cluster.count - 3} more</div>` : ''}
                        <button class="popup-button" onclick="handleClusterClick()">
                            Zoom to see all
                        </button>
                    </div>
                `;

                marker.bindPopup(popupContent, {
                    maxWidth: 250,
                    className: 'marker-popup'
                });

                marker.addTo(map);
                clusterMarkers.push(marker);
            });
        }

        // Handle venue click from popup
        function handleVenueClick(venueId) {
            sendToReactNative({
                type: 'venuePress',
                venueId: venueId
            });
        }

        // Handle cluster click
        function handleClusterClick() {
            map.zoomIn();
        }

        // Format price to VND
        function formatPrice(price) {
            return new Intl.NumberFormat('vi-VN', {
                style: 'currency',
                currency: 'VND'
            }).format(price);
        }

        // Show loading indicator
        function showLoading() {
            document.getElementById('loading').classList.add('active');
        }

        // Hide loading indicator
        function hideLoading() {
            document.getElementById('loading').classList.remove('active');
        }

        // Fit map to show all markers
        function fitToMarkers() {
            if (venueMarkers.length > 0) {
                const group = new L.featureGroup(venueMarkers);
                map.fitBounds(group.getBounds(), { padding: [50, 50] });
            }
        }

        // Pan to location
        function panTo(lat, lng, zoom) {
            map.setView([lat, lng], zoom || currentZoom);
        }

        // Receive messages from React Native
        document.addEventListener('message', function(event) {
            try {
                const data = JSON.parse(event.data);

                switch (data.action) {
                    case 'init':
                        initMap(data.centerLat, data.centerLng, data.zoom);
                        break;

                    case 'displayVenues':
                        displayVenues(data.venues);
                        break;

                    case 'displayClusters':
                        displayClusters(data.clusters);
                        break;

                    case 'panTo':
                        panTo(data.lat, data.lng, data.zoom);
                        break;

                    case 'showLoading':
                        showLoading();
                        break;

                    case 'hideLoading':
                        hideLoading();
                        break;

                    case 'fitToMarkers':
                        fitToMarkers();
                        break;
                }
            } catch (error) {
                console.error('Error processing message:', error);
            }
        });
    </script>
</body>
</html>
